# VidTube Production Nginx Configuration Template
# This file serves as a guide for deploying the application.
# Save this file to /etc/nginx/sites-available/vidtube and symlink to sites-enabled.

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect all HTTP requests to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL Certificates (Uncomment and set paths in production)
    # ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;

    # Increase body size limit to allow uploading large videos
    client_max_body_size 500M;

    # Gzip Compression for faster page loads
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_proxied any;
    gzip_min_length 1000;

    # 1. Serve static Frontend files
    location / {
        root /var/www/vidtube/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets (CSS, JS, images, fonts)
        location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|woff|woff2)$ {
            expires 1M;
            access_log off;
            add_header Cache-Control "public, no-transform";
        }
    }

    # 2. Proxy API requests to Express Backend
    location /api/v1/ {
        proxy_pass http://127.0.0.1:3000; # Points to the local Node process (PM2)
        proxy_http_version 1.1;
        
        # Proxy Headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts for large uploads
        proxy_connect_timeout 600;
        proxy_send_timeout 600;
        proxy_read_timeout 600;
        send_timeout 600;
    }

    # Custom Error Pages
    error_page 502 /502.html;
    location = /502.html {
        root /usr/share/nginx/html;
        internal;
    }
}
